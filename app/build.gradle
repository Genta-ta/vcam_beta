plugins {
    id 'com.android.application' version '8.4.0'
}

android {
    namespace 'com.gentata.vcam'
    compileSdk 34

    defaultConfig {
        applicationId "com.gentata.vcam"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
}

dependencies {
    // Cara Normal: Ambil otomatis dari server Maven
    compileOnly 'io.github.libxposed:api:1.0.0'
    
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
