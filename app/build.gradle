plugins {
    id 'com.android.application' version '8.4.0'
}

android {
    namespace 'com.gentata.vcam'
    compileSdk 34
    defaultConfig {
        applicationId "com.gentata.vcam"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
}

dependencies {
    compileOnly 'io.github.libxposed:api:101.0.1'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    
    // FFmpeg Kit untuk Android (Penerjemah RTMP)
    implementation 'com.arthenica:ffmpeg-kit-full:6.0-2'
}
